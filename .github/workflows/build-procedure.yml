name: Build Procedure

# Reusable workflow: builds a single Zela procedure to a WebAssembly Component
# (`wasm32-wasip2`) and uploads the artifact for downstream jobs.
#
# Outputs the artifact under the name `${procedure}-wasm`.
#
# Security note: every input that flows into a `run:` block is forwarded via
# `env:` rather than expanded inline, to neutralise command-injection if a
# caller forwards untrusted data into one of these inputs.

on:
  workflow_call:
    inputs:
      procedure:
        description: "Procedure name (used for the artifact name and as the default cargo package)."
        required: true
        type: string
      cargo-package:
        description: "Cargo package to build. Defaults to the procedure name."
        required: false
        type: string
        default: ""
      rust-toolchain:
        description: "Rustup toolchain to install (e.g. 'stable', '1.85', 'nightly')."
        required: false
        type: string
        default: "stable"
      wasi-sdk-version:
        description: "wasi-sdk major version to install (e.g. '30')."
        required: false
        type: string
        default: "30"
      wasm-tools-version:
        description: "wasm-tools version to install (used for component-aware stripping and re-bundling)."
        required: false
        type: string
        default: "1.247.0"
      binaryen-version:
        description: "binaryen (wasm-opt) release tag to install. Component-model wasm cannot be opt'd directly; we round-trip via wasm-tools."
        required: false
        type: string
        default: "version_129"
      wasmtime-version:
        description: "wasmtime release tag the WASI Preview 1 reactor adapter is downloaded from."
        required: false
        type: string
        default: "v37.0.0"
      runs-on:
        description: "GitHub-hosted runner image."
        required: false
        type: string
        default: "ubuntu-latest"
      cargo-build-args:
        description: "Extra args appended to `cargo build`. Treated as a trusted shell fragment — only set this from caller-controlled values."
        required: false
        type: string
        default: ""
    outputs:
      artifact-name:
        description: "Name of the uploaded artifact containing the .wasm."
        value: ${{ jobs.build.outputs.artifact-name }}

jobs:
  build:
    name: Build ${{ inputs.procedure }}
    runs-on: ${{ inputs.runs-on }}
    outputs:
      artifact-name: ${{ steps.config.outputs.artifact-name }}
    steps:
      - name: Resolve config
        id: config
        env:
          INPUT_PROCEDURE: ${{ inputs.procedure }}
          INPUT_CARGO_PACKAGE: ${{ inputs.cargo-package }}
        run: |
          pkg="${INPUT_CARGO_PACKAGE:-$INPUT_PROCEDURE}"
          echo "cargo-package=$pkg" >> "$GITHUB_OUTPUT"
          echo "artifact-name=${INPUT_PROCEDURE}-wasm" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6

      - name: Cache wasi-sdk
        id: wasi-sdk-cache
        uses: actions/cache@v5
        with:
          path: /tmp/wasi-sdk.deb
          key: wasi-sdk-${{ inputs.wasi-sdk-version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Download wasi-sdk
        if: steps.wasi-sdk-cache.outputs.cache-hit != 'true'
        env:
          WASI_SDK_VERSION: ${{ inputs.wasi-sdk-version }}
        run: |
          # The wasi-sdk asset names follow `wasi-sdk-<ver>.0-<arch>-<os>.deb`.
          # GitHub-hosted ubuntu-latest runners are x86_64; if you switch to
          # arm64 self-hosted runners, override `runs-on` and update this URL.
          curl -L --fail --progress-bar \
            -o /tmp/wasi-sdk.deb \
            "https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_SDK_VERSION}/wasi-sdk-${WASI_SDK_VERSION}.0-x86_64-linux.deb"

      - name: Install wasi-sdk
        run: sudo dpkg -i /tmp/wasi-sdk.deb

      - name: Install Rust toolchain ${{ inputs.rust-toolchain }} + wasm32-wasip2 target
        env:
          RUST_TOOLCHAIN: ${{ inputs.rust-toolchain }}
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --no-self-update
          rustup default "$RUST_TOOLCHAIN"
          rustup target add wasm32-wasip2

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          # Per-procedure key prevents cache pollution when multiple procedures
          # share the same workspace but pull different feature sets.
          shared-key: "zela-procedure-${{ inputs.procedure }}"
          cache-on-failure: true

      - name: Build ${{ steps.config.outputs.cargo-package }}
        env:
          # `cargo build` looks up `CC_wasm32_wasip2` and `WASI_SYSROOT` to
          # compile any FFI dependencies (e.g. ring/openssl) for the target.
          CC_wasm32_wasip2: /opt/wasi-sdk/bin/clang
          WASI_SYSROOT: /opt/wasi-sdk/share/wasi-sysroot
          CARGO_PACKAGE: ${{ steps.config.outputs.cargo-package }}
          # `cargo-build-args` is documented as a trusted shell fragment —
          # callers set fixed flags like `--features foo`. We still bind via
          # env so it's at least visible in the step config, not interpolated.
          CARGO_BUILD_ARGS: ${{ inputs.cargo-build-args }}
        run: |
          # shellcheck disable=SC2086
          cargo build --release --locked \
            --target wasm32-wasip2 \
            --package "$CARGO_PACKAGE" \
            $CARGO_BUILD_ARGS

      # Cache wasm-tools binary by version so it isn't recompiled every run.
      - name: Cache wasm-tools
        id: wasm-tools-cache
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/wasm-tools
          key: wasm-tools-${{ inputs.wasm-tools-version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install wasm-tools
        if: steps.wasm-tools-cache.outputs.cache-hit != 'true'
        env:
          WASM_TOOLS_VERSION: ${{ inputs.wasm-tools-version }}
        run: cargo install --locked --version "$WASM_TOOLS_VERSION" wasm-tools

      - name: Cache binaryen
        id: binaryen-cache
        uses: actions/cache@v5
        with:
          path: /opt/binaryen
          key: binaryen-${{ inputs.binaryen-version }}-${{ runner.os }}-${{ runner.arch }}

      - name: Install binaryen (wasm-opt)
        if: steps.binaryen-cache.outputs.cache-hit != 'true'
        env:
          BINARYEN_VERSION: ${{ inputs.binaryen-version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          sudo mkdir -p /opt/binaryen
          gh release download --repo WebAssembly/binaryen "$BINARYEN_VERSION" \
            --pattern 'binaryen-*-x86_64-linux.tar.gz' --output /tmp/binaryen.tar.gz
          sudo tar -xzf /tmp/binaryen.tar.gz -C /opt/binaryen --strip-components=1

      - name: Cache WASI reactor adapter
        id: wasi-adapter-cache
        uses: actions/cache@v5
        with:
          path: /tmp/wasi_snapshot_preview1.reactor.wasm
          key: wasi-adapter-${{ inputs.wasmtime-version }}-${{ runner.os }}

      - name: Download WASI Preview 1 reactor adapter
        if: steps.wasi-adapter-cache.outputs.cache-hit != 'true'
        env:
          WASMTIME_VERSION: ${{ inputs.wasmtime-version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo bytecodealliance/wasmtime "$WASMTIME_VERSION" \
            --pattern 'wasi_snapshot_preview1.reactor.wasm' --output /tmp/wasi_snapshot_preview1.reactor.wasm

      - name: Optimise wasm component
        env:
          WASM_PATH: target/wasm32-wasip2/release/${{ steps.config.outputs.cargo-package }}.wasm
          PATH_BINARYEN: /opt/binaryen/bin
          ADAPTER: /tmp/wasi_snapshot_preview1.reactor.wasm
        run: |
          # Component Model wasm cannot be passed to `wasm-opt` directly
          # (binaryen issue 6728). We round-trip:
          #   1. wasm-tools strip            — drop producer/name/target-features sections
          #   2. wasm-tools component wit    — extract the resolved WIT (incl. WASI imports)
          #   3. wasm-tools component unbundle — split out the inner core module
          #   4. wasm-opt -Oz                — optimise the core module (binaryen DOES handle core modules)
          #   5. wasm-tools component embed  — re-attach the extracted WIT
          #   6. wasm-tools component new    — rewrap as a component using the WASI reactor adapter
          # If steps 2-6 fail (e.g. wit-parser bug on a particular WASI subset
          # like wasi:clocks under wit-parser 0.247), we keep the stripped
          # version so we still get the strip-only saving (~1-3%).

          set +e
          before=$(stat -c%s "$WASM_PATH")
          work="$(mktemp -d)"
          export PATH="$PATH_BINARYEN:$PATH"

          wasm-tools strip "$WASM_PATH" -o "$work/stripped.wasm"
          # Default outcome: keep the stripped version
          cp "$work/stripped.wasm" "$work/result.wasm"

          # Try the full round-trip.
          # `wasm-tools component wit` extracts the WIT at the version the OUTER
          # component declares (currently wasi:*@0.2.9 from rustc's wasm32-wasip2
          # toolchain). The INNER core module's wasi-libc imports target the
          # older wasi:*@0.2.0 ABI. wit-parser panics when the embed step tries
          # to merge those mismatched versions. Patching the version string in
          # the WIT pre-embed avoids the bug — the type semantics are identical
          # across 0.2.x patches, only the package version label differs.
          if wasm-tools component wit "$work/stripped.wasm" 2>/dev/null | sed 's/@0\.2\.9/@0.2.0/g' > "$work/full.wit" \
             && wasm-tools component unbundle --module-dir "$work" --threshold 0 "$work/stripped.wasm" -o "$work/wrap.wasm" 2>/dev/null \
             && [ -f "$work/unbundled-module0.wasm" ] \
             && wasm-opt -Oz --enable-bulk-memory --enable-sign-ext --enable-multivalue --enable-mutable-globals --enable-reference-types --enable-nontrapping-float-to-int --debuginfo "$work/unbundled-module0.wasm" -o "$work/core.opt" 2>/dev/null \
             && wasm-tools component embed "$work/full.wit" --world root "$work/core.opt" -o "$work/core.embedded" 2>/dev/null \
             && wasm-tools component new --adapt "wasi_snapshot_preview1=$ADAPTER" "$work/core.embedded" -o "$work/result.wasm" 2>/dev/null ; then
            mode="full round-trip"
          else
            cp "$work/stripped.wasm" "$work/result.wasm"
            mode="strip-only (round-trip skipped)"
          fi

          # Verify the result still parses as a valid component
          if ! wasm-tools validate "$work/result.wasm" 2>/dev/null ; then
            echo "::warning::Optimised wasm failed validation; reverting to original."
            cp "$WASM_PATH" "$work/result.wasm"
            mode="reverted (validation failed)"
          fi

          mv "$work/result.wasm" "$WASM_PATH"
          after=$(stat -c%s "$WASM_PATH")
          saved=$((before - after))
          pct=$(awk "BEGIN{printf \"%.2f\", $saved * 100 / $before}")
          echo "Optimised ($mode): $before B -> $after B (saved $saved B, -$pct%)"

      - name: Upload wasm artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ steps.config.outputs.artifact-name }}
          path: target/wasm32-wasip2/release/${{ steps.config.outputs.cargo-package }}.wasm
          if-no-files-found: error
          retention-days: 90
