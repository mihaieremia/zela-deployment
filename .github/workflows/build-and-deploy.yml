name: Build and Deploy Procedure

# Reusable workflow: composes `build-procedure.yml` + `deploy-procedure.yml`.
# Use this when you want a single one-shot deploy step.
#
# If you need to inspect or test the wasm before deploying, call the two
# underlying workflows directly with your own job in between.

on:
  workflow_call:
    inputs:
      procedure:
        description: "Procedure name (used for the artifact name, dashboard procedure, and as the default cargo package)."
        required: true
        type: string
      project:
        description: "Zela project ID (UUID from the dashboard)."
        required: true
        type: string
      cargo-package:
        description: "Cargo package to build. Defaults to the procedure name."
        required: false
        type: string
        default: ""
      rust-toolchain:
        description: "Rustup toolchain to install."
        required: false
        type: string
        default: "stable"
      wasi-sdk-version:
        description: "wasi-sdk major version to install."
        required: false
        type: string
        default: "30"
      runs-on:
        description: "GitHub-hosted runner image."
        required: false
        type: string
        default: "ubuntu-latest"
      cargo-build-args:
        description: "Extra args appended to `cargo build`."
        required: false
        type: string
        default: ""
    secrets:
      key-id:
        description: "Zela project key ID."
        required: true
      key-secret:
        description: "Zela project key secret."
        required: true

jobs:
  # Inner `uses:` references must be absolute (`org/repo/...@ref`) so this
  # composer also works when called from another repo. Relative paths
  # (`./.github/workflows/...`) only resolve against the calling repo, which
  # silently breaks cross-repo invocations.
  build:
    uses: mihaieremia/zela-deployment/.github/workflows/build-procedure.yml@v1
    with:
      procedure: ${{ inputs.procedure }}
      cargo-package: ${{ inputs.cargo-package }}
      rust-toolchain: ${{ inputs.rust-toolchain }}
      wasi-sdk-version: ${{ inputs.wasi-sdk-version }}
      runs-on: ${{ inputs.runs-on }}
      cargo-build-args: ${{ inputs.cargo-build-args }}

  deploy:
    needs: build
    uses: mihaieremia/zela-deployment/.github/workflows/deploy-procedure.yml@v1
    with:
      procedure: ${{ inputs.procedure }}
      project: ${{ inputs.project }}
      wasm-artifact: ${{ needs.build.outputs.artifact-name }}
      runs-on: ${{ inputs.runs-on }}
    secrets:
      key-id: ${{ secrets.key-id }}
      key-secret: ${{ secrets.key-secret }}
