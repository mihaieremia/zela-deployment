name: Deploy Procedure

# Reusable workflow: uploads a pre-built `.wasm` to Zela's builder API.
# Pair with `build-procedure.yml` (or build the wasm yourself and pass the
# artifact name).
#
# Security note: every input that flows into a `run:` block is forwarded via
# `env:` rather than expanded inline, to neutralise command-injection if a
# caller forwards untrusted data into one of these inputs.

on:
  workflow_call:
    inputs:
      procedure:
        description: "Procedure name (must match the destination on the dashboard)."
        required: true
        type: string
      project:
        description: "Zela project ID (UUID from the dashboard)."
        required: true
        type: string
      wasm-artifact:
        description: "Name of the artifact (uploaded by a previous job) containing the .wasm."
        required: true
        type: string
      wasm-file-name:
        description: "Filename inside the artifact. Defaults to `${procedure}.wasm`."
        required: false
        type: string
        default: ""
      runs-on:
        description: "GitHub-hosted runner image."
        required: false
        type: string
        default: "ubuntu-latest"
    secrets:
      key-id:
        description: "Zela project key ID."
        required: true
      key-secret:
        description: "Zela project key secret."
        required: true

jobs:
  deploy:
    name: Deploy ${{ inputs.procedure }}
    runs-on: ${{ inputs.runs-on }}
    steps:
      - name: Resolve filename
        id: config
        env:
          INPUT_PROCEDURE: ${{ inputs.procedure }}
          INPUT_WASM_FILE_NAME: ${{ inputs.wasm-file-name }}
        run: |
          name="${INPUT_WASM_FILE_NAME:-${INPUT_PROCEDURE}.wasm}"
          echo "wasm-file-name=$name" >> "$GITHUB_OUTPUT"

      - name: Download wasm artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.wasm-artifact }}
          path: ./artifact

      - name: Verify artifact
        env:
          WASM_FILE_NAME: ${{ steps.config.outputs.wasm-file-name }}
          ARTIFACT_NAME: ${{ inputs.wasm-artifact }}
        run: |
          path="./artifact/${WASM_FILE_NAME}"
          if [ ! -f "$path" ]; then
            echo "::error::Expected $path inside artifact '${ARTIFACT_NAME}', but it was not found."
            echo "Artifact contents:" ; ls -la ./artifact
            exit 1
          fi
          # Sanity-check the magic bytes: WASM modules and Component Model
          # components both begin with the four bytes 00 61 73 6D ("\0asm").
          magic=$(head -c 4 "$path" | xxd -p)
          if [ "$magic" != "0061736d" ]; then
            echo "::error::$path is not a valid wasm file (magic = $magic, expected 0061736d)."
            exit 1
          fi
          size=$(stat -c%s "$path")
          echo "Verified $path ($size bytes)."

      - name: Acquire OAuth token
        id: token
        env:
          ZELA_KEY_ID: ${{ secrets.key-id }}
          ZELA_KEY_SECRET: ${{ secrets.key-secret }}
        run: |
          # Endpoint is hardcoded — accepting it as a caller input would let a
          # caller forwarding untrusted data exfiltrate the project key
          # (Basic-auth body) to an arbitrary host. If you need a non-prod
          # tenant, fork this workflow and change the URL here.
          set +e
          response=$(curl -sS --fail-with-body --user "$ZELA_KEY_ID:$ZELA_KEY_SECRET" \
            --data-urlencode 'grant_type=client_credentials' \
            --data-urlencode 'scope=zela-builder:read zela-builder:write' \
            'https://auth.zela.io/realms/zela/protocol/openid-connect/token')
          curl_exit=$?
          set -e
          if [ "$curl_exit" -ne 0 ]; then
            echo "::error::OAuth token request failed at the transport/HTTP layer (curl exit $curl_exit)."
            echo "Response body (sensitive fields stripped):"
            echo "$response" | jq 'del(.access_token, .refresh_token)' 2>/dev/null || echo "$response"
            exit 1
          fi
          token=$(echo "$response" | jq -r '.access_token // empty')
          if [ -z "$token" ]; then
            echo "::error::OAuth response was 2xx but did not contain access_token."
            echo "$response" | jq 'del(.access_token, .refresh_token)' 2>/dev/null || echo "$response"
            exit 1
          fi
          # Mask the token so accidental echoes are scrubbed from logs.
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"

      - name: Upload wasm to Zela
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          INPUT_PROCEDURE: ${{ inputs.procedure }}
          INPUT_PROJECT: ${{ inputs.project }}
          WASM_FILE_NAME: ${{ steps.config.outputs.wasm-file-name }}
        run: |
          # Endpoint is hardcoded — see the OAuth step for the rationale.
          # `procedure`, `project`, and `wasm-file-name` are URL-encoded via
          # jq so caller-controlled `?`, `&`, `/`, or whitespace can't change
          # request semantics or break out of the query string.
          encode() { jq -nrR --arg s "$1" '$s|@uri'; }
          path="./artifact/${WASM_FILE_NAME}"
          procedure_enc=$(encode "$INPUT_PROCEDURE")
          project_enc=$(encode "$INPUT_PROJECT")
          file_name_enc=$(encode "$WASM_FILE_NAME")
          url="https://core.zela.io/procedures/${procedure_enc}/wasm?project=${project_enc}&file_name=${file_name_enc}"

          # Capture body, exit code, and HTTP status separately so we can
          # surface transport failures (DNS/TLS/connect) AND HTTP errors with
          # the API's error message on either path. `set +e` is needed because
          # GitHub Actions defaults shell to `bash -e {0}` and curl exits non-
          # zero on any transport failure, which would otherwise abort the step
          # before our diagnostics block runs.
          set +e
          http_code=$(curl --progress-bar -o /tmp/zela-response.txt -w '%{http_code}' \
            -H "authorization: Bearer $TOKEN" \
            -H 'content-type: application/wasm' \
            --data-binary "@$path" \
            "$url")
          curl_exit=$?
          set -e

          echo "HTTP $http_code (curl exit $curl_exit)"
          if [ "$curl_exit" -ne 0 ] && [ "$http_code" = "000" ]; then
            echo "::error::Upload failed at the transport/HTTP layer (curl exit $curl_exit). Network, DNS, or TLS error reaching core.zela.io."
            exit 1
          fi
          if [ "$http_code" = "404" ]; then
            echo "::error::Procedure '${INPUT_PROCEDURE}' is not registered on the Zela dashboard for project ${INPUT_PROJECT}. Create it first (Dashboard → Procedures → New procedure), then re-run this workflow."
            echo "Response body:"
            cat /tmp/zela-response.txt
            exit 1
          fi
          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "::error::Deploy failed with HTTP $http_code."
            echo "Response body:"
            cat /tmp/zela-response.txt
            exit 1
          fi
          echo "Deploy succeeded."
          cat /tmp/zela-response.txt
